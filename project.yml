name: xsaver
options:
  bundleIdPrefix: com.xsaver
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
targets:
  xsaver:
    type: application
    platform: macOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: xsaver
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "xsaver — local X video downloader"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xsaver.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_HARDENED_RUNTIME: NO
        COMBINE_HIDPI_IMAGES: YES
